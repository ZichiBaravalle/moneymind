# /etc/nginx/sites-available/moneymind. dev

# ============================================
# MONEYMIND. DEV (porta 3000)
# ============================================

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name moneymind.zichibaravalle.it;

    return 301 https://$server_name$request_uri;
}

# HTTPS - Reverse Proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name moneymind.zichibaravalle.it;

    # SSL Configuration
    ssl_certificate /root/.ssl/cert.pem;
    ssl_certificate_key /root/.ssl/key-nopass.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/moneymind.dev-access.log;
    error_log /var/log/nginx/moneymind.dev-error.log;

    # Reverse Proxy to Node.js (porta 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Cookie handling
        proxy_cookie_path / /;
        proxy_cookie_domain localhost $host;
        proxy_cookie_domain 127.0.0.1 $host;

        # Redirect handling
        proxy_redirect http://localhost:3000/ https://$host/;
        proxy_redirect http://127.0.0.1:3000/ https://$host/;
        proxy_redirect http:// https://;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }
}
